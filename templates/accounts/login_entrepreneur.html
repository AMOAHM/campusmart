{% extends 'base.html' %}

{% block title %}Entrepreneur Login - Campus Mart{% endblock %}

{% block extra_css %}
<style>
    .auth-card {
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border) !important;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4) !important;
        border-radius: 20px !important;
    }
    
    .auth-card .card-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%) !important;
        border-bottom: 1px solid var(--glass-border);
        padding: 2rem !important;
        border-radius: 20px 20px 0 0 !important;
    }

    .form-label {
        color: var(--text-primary) !important;
    }
</style>
{% endblock %}

{% block content %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card auth-card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Entrepreneur Login</h4>
                </div>
                <div class="card-body p-5">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" autofocus required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    
                    <div class="text-center mb-3">
                        <a href="{% url 'password_reset' %}" class="text-decoration-none">
                            <i class="fas fa-key me-1"></i> Forgot Password?
                        </a>
                    </div>
                    
                    <hr>
                    
                    <p class="text-center">Don't have an account? <a href="{% url 'accounts:register_entrepreneur' %}">Create one</a></p>
                    <p class="text-center text-muted small">Are you a customer? <a href="{% url 'accounts:login_customer' %}">Login as customer</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
